<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>FAA Asset Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --surface: #111820;
    --border: #1e2d3d;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #cdd9e5;
    --muted: #4a6278;
    --success: #39d353;
    --danger: #ff4444;
    --mono: 'Share Tech Mono', monospace;
    --display: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  .header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 10px; }
  .logo {
    font-family: var(--display);
    font-weight: 900;
    font-size: 22px;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo span { color: var(--accent2); }
  .badge {
    background: var(--accent);
    color: var(--bg);
    font-family: var(--display);
    font-weight: 700;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  .scan-count { font-size: 12px; color: var(--muted); }
  .scan-count span { color: var(--success); }

  main {
    flex: 1;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    max-width: 600px;
    margin: 0 auto;
    width: 100%;
  }

  .camera-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    position: relative;
  }
  .section-label {
    font-family: var(--display);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 10px 14px 0;
  }

  #videoContainer {
    position: relative;
    background: #000;
    width: 100%;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #videoEl {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
  }
  .camera-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
  }
  .cam-icon { font-size: 40px; }

  .corners { position: absolute; inset: 16px; pointer-events: none; }
  .corner {
    position: absolute;
    width: 20px; height: 20px;
    border-color: var(--accent);
    border-style: solid;
    opacity: 0.7;
  }
  .corner.tl { top:0; left:0; border-width: 2px 0 0 2px; }
  .corner.tr { top:0; right:0; border-width: 2px 2px 0 0; }
  .corner.bl { bottom:0; left:0; border-width: 0 0 2px 2px; }
  .corner.br { bottom:0; right:0; border-width: 0 2px 2px 0; }

  .scan-line {
    position: absolute;
    left: 10%; right: 10%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: scanMove 2s ease-in-out infinite;
    display: none;
    opacity: 0.8;
  }
  @keyframes scanMove {
    0% { top: 15%; opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { top: 85%; opacity: 0; }
  }

  .camera-controls {
    display: flex;
    gap: 10px;
    padding: 12px 14px;
  }

  #fileInput { display: none; }

  .btn {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: 4px;
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: var(--bg); }
  .btn-primary:hover { filter: brightness(1.15); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-secondary {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .btn-secondary:hover { background: rgba(0,212,255,0.08); }
  .btn-danger { background: var(--danger); color: #fff; width: 100%; }
  .btn-danger:hover { filter: brightness(1.1); }

  .processing-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(10,14,20,0.85);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 12px;
    font-family: var(--display);
    font-size: 16px;
    letter-spacing: 2px;
    color: var(--accent);
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .fields-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .fields-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }
  .field-row { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .field-value {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 8px 10px;
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text);
    width: 100%;
    outline: none;
    transition: border-color 0.15s;
  }
  .field-value:focus { border-color: var(--accent); }
  .field-value.populated { border-color: var(--success); color: var(--success); }

  .assets-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
  }
  .assets-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .asset-list { display: flex; flex-direction: column; gap: 8px; }
  .asset-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: 3px;
    padding: 10px;
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-8px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .asset-info { flex: 1; }
  .asset-tag { color: var(--accent); font-size: 13px; font-weight: bold; }
  .asset-detail { color: var(--muted); margin-top: 2px; }
  .remove-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 4px;
    line-height: 1;
  }
  .remove-btn:hover { color: var(--danger); }

  .empty-list {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 20px;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  .actions-section {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 30px;
  }
  .email-row { display: flex; flex-direction: column; gap: 4px; }

  .toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--success);
    color: var(--bg);
    font-family: var(--display);
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    padding: 10px 20px;
    border-radius: 4px;
    transition: transform 0.3s ease;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  canvas { display: none; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">FAA<span>.</span>SCAN</div>
    <div class="badge">M.C. DEAN</div>
  </div>
  <div class="scan-count">CAPTURED: <span id="countDisplay">0</span></div>
</div>

<main>

  <div class="camera-section">
    <div class="section-label">◈ CAMERA / IMAGE INPUT</div>
    <div id="videoContainer">
      <video id="videoEl" autoplay playsinline muted></video>
      <div class="camera-placeholder" id="camPlaceholder">
        <div class="cam-icon">📷</div>
        <div>Tap START CAMERA or upload image</div>
      </div>
      <div class="corners">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>
      <div class="scan-line" id="scanLine"></div>
      <div class="processing-overlay" id="processingOverlay">
        <div class="spinner"></div>
        <div>ANALYZING...</div>
      </div>
    </div>
    <div class="camera-controls">
      <button class="btn btn-primary" id="startCamBtn" onclick="startCamera()">▶ Start Camera</button>
      <button class="btn btn-secondary" id="captureBtn" onclick="captureFrame()" disabled>⊙ Capture</button>
      <label class="btn btn-secondary" style="text-align:center;line-height:2;">
        ↑ Upload
        <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
      </label>
    </div>
  </div>

  <div class="fields-section">
    <div class="section-label">◈ EXTRACTED DATA</div>
    <div class="fields-grid">
      <div class="field-row">
        <div class="field-label">Asset Tag (Property of FAA #)</div>
        <input class="field-value" id="fieldAssetTag" placeholder="—" />
      </div>
      <div class="field-row">
        <div class="field-label">Part No / Model</div>
        <input class="field-value" id="fieldModel" placeholder="—" />
      </div>
      <div class="field-row">
        <div class="field-label">Serial No</div>
        <input class="field-value" id="fieldSerial" placeholder="—" />
      </div>
    </div>
    <div style="margin-top:12px;">
      <button class="btn btn-primary" style="width:100%" onclick="addAsset()" id="addBtn" disabled>+ ADD TO LIST</button>
    </div>
  </div>

  <div class="assets-section">
    <div class="assets-header">
      <div class="section-label" style="padding:0">◈ SCAN LIST</div>
    </div>
    <div class="asset-list" id="assetList">
      <div class="empty-list" id="emptyMsg">No assets scanned yet</div>
    </div>
  </div>

  <div class="actions-section">
    <div class="email-row">
      <div class="field-label">◈ SEND CSV TO EMAIL</div>
      <input class="field-value" id="emailInput" type="email" placeholder="recipient@example.com" style="font-size:14px;" />
    </div>
    <button class="btn btn-danger" onclick="finishAndSend()">
      ■ END SESSION &amp; SEND CSV
    </button>
  </div>

</main>

<canvas id="captureCanvas"></canvas>
<div class="toast" id="toast"></div>

<script>
let stream = null;
let assets = [];

const video = document.getElementById('videoEl');
const captureBtn = document.getElementById('captureBtn');
const startCamBtn = document.getElementById('startCamBtn');
const processingOverlay = document.getElementById('processingOverlay');
const scanLine = document.getElementById('scanLine');
const camPlaceholder = document.getElementById('camPlaceholder');
const addBtn = document.getElementById('addBtn');

function showToast(msg, color) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = color || 'var(--success)';
  t.style.color = color ? '#fff' : 'var(--bg)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }
    });
    video.srcObject = stream;
    video.style.display = 'block';
    camPlaceholder.style.display = 'none';
    scanLine.style.display = 'block';
    captureBtn.disabled = false;
    startCamBtn.textContent = '◉ Camera On';
    startCamBtn.style.background = 'var(--success)';
    startCamBtn.style.color = 'var(--bg)';
  } catch(e) {
    showToast('Camera unavailable — use Upload', 'var(--accent2)');
  }
}

function captureFrame() {
  const canvas = document.getElementById('captureCanvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
  analyzeImage(dataUrl);
}

function handleFileUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => analyzeImage(ev.target.result);
  reader.readAsDataURL(file);
  e.target.value = '';
}

async function analyzeImage(dataUrl) {
  processingOverlay.style.display = 'flex';
  const base64 = dataUrl.split(',')[1];
  const mediaType = dataUrl.split(';')[0].split(':')[1];

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 400,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: mediaType, data: base64 }
            },
            {
              type: 'text',
              text: `Extract these fields from the label/image. Return ONLY valid JSON, no markdown, no extra text:
{
  "asset_tag": "<the number under 'Property of FAA' on asset tag labels, OR the Asset Tag field value, or null>",
  "model": "<Part No or model number, e.g. UTR-9216ABTRLNL, or null>",
  "serial": "<Serial No value, or null>"
}
If a field is not visible or not applicable, use null.`
            }
          ]
        }]
      })
    });

    const data = await resp.json();
    const text = data.content?.find(b => b.type === 'text')?.text || '{}';
    const clean = text.replace(/```json|```/g, '').trim();
    const parsed = JSON.parse(clean);

    setField('fieldAssetTag', parsed.asset_tag);
    setField('fieldModel', parsed.model);
    setField('fieldSerial', parsed.serial);

    addBtn.disabled = false;
    showToast('✓ Data extracted');
  } catch(err) {
    showToast('Extraction failed — edit manually', 'var(--accent2)');
    addBtn.disabled = false;
  } finally {
    processingOverlay.style.display = 'none';
  }
}

function setField(id, val) {
  const el = document.getElementById(id);
  el.value = val || '';
  el.classList.toggle('populated', !!val);
}

function clearFields() {
  ['fieldAssetTag','fieldModel','fieldSerial'].forEach(id => setField(id, null));
  addBtn.disabled = true;
}

function addAsset() {
  const tag = document.getElementById('fieldAssetTag').value.trim();
  const model = document.getElementById('fieldModel').value.trim();
  const serial = document.getElementById('fieldSerial').value.trim();

  if (!tag && !model && !serial) {
    showToast('Nothing to add', 'var(--accent2)');
    return;
  }

  assets.push({ tag, model, serial });
  renderList();
  clearFields();
  document.getElementById('countDisplay').textContent = assets.length;
  showToast(`Asset ${tag || model} added`);
}

function removeAsset(i) {
  assets.splice(i, 1);
  renderList();
  document.getElementById('countDisplay').textContent = assets.length;
}

function renderList() {
  const list = document.getElementById('assetList');
  if (assets.length === 0) {
    list.innerHTML = '<div class="empty-list">No assets scanned yet</div>';
    return;
  }
  list.innerHTML = assets.map((a, i) => `
    <div class="asset-item">
      <div class="asset-info">
        <div class="asset-tag">TAG: ${a.tag || '—'}</div>
        <div class="asset-detail">MODEL: ${a.model || '—'} | S/N: ${a.serial || '—'}</div>
      </div>
      <button class="remove-btn" onclick="removeAsset(${i})">✕</button>
    </div>
  `).join('');
}

function buildCSV() {
  const headers = ['Action','Name','Asset Tag','Manufacturer','Serial #','Model','Location','Status','Condition'];
  const rows = assets.map(a => {
    const name = `LENEL ${a.model || ''} Tag: ${a.tag || ''}`.trim();
    return [
      'CREATE', name, a.tag || '', 'LENEL', a.serial || '',
      a.model || '', 'Tysons HQ - 12th Floor Lab', 'Reserved', 'A1'
    ].map(v => `"${v}"`).join(',');
  });
  return [headers.join(','), ...rows].join('\n');
}

function finishAndSend() {
  if (assets.length === 0) {
    showToast('No assets scanned yet', 'var(--accent2)');
    return;
  }

  const email = document.getElementById('emailInput').value.trim();
  const csv = buildCSV();

  // Download CSV
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `FAA_Assets_Import_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);

  // Open mailto if email provided
  if (email) {
    const subject = encodeURIComponent(`FAA Asset Import - ${assets.length} Assets - ${new Date().toLocaleDateString()}`);
    const body = encodeURIComponent(`Please find the attached FAA Asset Import CSV.\n\nAssets scanned: ${assets.length}\nDate: ${new Date().toLocaleString()}\n\nNote: CSV has been downloaded to your device. Please attach it to this email.\n\n--- ASSET LIST ---\n${assets.map(a => `Tag: ${a.tag} | Model: ${a.model} | S/N: ${a.serial}`).join('\n')}`);
    window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
  }

  showToast(`✓ CSV downloaded (${assets.length} assets)`);
}
</script>

</body>
</html>
